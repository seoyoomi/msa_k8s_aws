apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
  namespace: lgcns

spec:
  # 자원공간의 낭비를 방지하고 관리의 편의성을 제공해주는 옵션!!!
  revisionHistoryLimit: 2

  replicas: 1
  selector:
    matchLabels:
      app: user

  template:
    metadata:
      labels:
        app: user 

    spec:
      # docker container 
      containers:
        - name: user-container

          # ecr 경로
          image: 310095858382.dkr.ecr.us-west-1.amazonaws.com/user-service:latest

          ports:
          - containerPort: 8080
          resources:
            # 컨테이너가 사용할 수 있는 최대치의 리소스
            limits:
              cpu: "1"
              memory: "500Mi"
            # 컨테이너가 기동할 때 보장받는 최소 리소스
            requests:
              cpu: "0.5"
              memory: "500Mi"

          # secret작성 후 외부 환경 변소를 이용해서 
          env:
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_HOST

          - name: DB_ADMIN
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_ADMIN

          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: lgcns-app-secrets
                key: DB_PASSWORD


         
          
---
# core service setting
# core group : pod, service, ConfigMap, Secret, namespace
apiVersion: v1 
kind: Service
metadata:
  name: user-service
  namespace: lgcns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: user