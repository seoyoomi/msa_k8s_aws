# msa - k8s - aws version
eureka:
  client:
    enabled: false

spring:
  application:
    name: user-service
      
      
  data:
    redis:
      host: redis-service
      port: 6379
      password: 
      timeout: 6000ms

  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}  
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate: 
        ddl-auto: create
    show-sql: true

jwt:
  secret: seoyoomi-super-secret-key-for-jwt-123456789
  