name: deploy order

on:
  push:
    branches:
      - main 


jobs:
  
  # job name
  build-and-deploy:
    
    # runner
    runs-on: ubuntu-latest

    # https://docs.github.com/ko/actions
    steps:
      - name: checkout github
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET}}
          aws-region: us-west-1

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region us-west-1 --name lgcns-seoyoomi-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      # infra 구축   
      - name: deploy infra
        run: |
          kubectl apply -f ./k8s/msa_ingress.yml
          kubectl apply -f ./k8s/msa_kafka.yml
          kubectl apply -f ./k8s/msa_redis.yml
          kubectl apply -f ./k8s/msa_zookeeper.yml
          kubectl rollout restart deployment order-deployment -n lgcns

      # image 생성하고 ecr push까지 자동화
      # apigateway, user, product, order
      - name: apigateway image build and push docker image to ecr
        env:
          REGISTRY: 310095858382.dkr.ecr.us-west-1.amazonaws.com
          REPOSITORY: apigateway
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f ./apigateway/Dockerfile ./apigateway
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: eks kubectl apigateway apply
        run: |
          kubectl apply -f ./apigateway/k8s/apigateway-depl.yml
          kubectl rollout restart deployment apigateway-deployment -n lgcns
