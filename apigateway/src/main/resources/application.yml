
# eks 배포 시 apigateway는 eureka server등록하지 않겠다하는 의미
eureka:
  client:
    enabled: false

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
        # cors 처리
        # 각 서비스 모듈은 웹브라우저와 직접 통신하지 않으므로 단일진입점인 gateway 담당
        globalcors:
            cors-configurations:
                '[/**]':
                    allowedOrigins:
                        - 'http://localhost:3000'
                    allowedMethods: '*'
                    allowedHeaders: '*'
                    exposedHeaders: '*'
                    allowCredentials: true

        # eureka server 에 등록된 client 찾아서 사용자의 url_pattern을 매핑하는 작업 
        routes:
            - id: user-service
              predicates:
                - Path=/user-service/**
              filters:
              # 첫번째 접두어를 제거하라는 의미
              # browser :  http://server.seoyoomi1102.shop/user-service/users/signIn
              # inner   :  http://server.seoyoomi1102.shop/users/signIn  
              - StripPrefix=1
              uri: http://user-service

            - id: product-service
              predicates:
                - Path=/product-service/**
              filters: 
                - StripPrefix=1
              uri: http://product-service

            - id: order-service
              predicates:
                - Path=/order-service/**
              filters: 
                - StripPrefix=1
              uri: http://order-service     

jwt:
  secret: seoyoomi-super-secret-key-for-jwt-123456789

