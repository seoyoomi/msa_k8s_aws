eureka:
  client:
    enabled: false

spring:
  application:
    name: product-service
      

  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire?useSSL=true&requireSSL=true  
    username: ${DB_ADMIN}  
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate: 
      ddl-auto: create
    show-sql: true

  kafka:
    # pod 실행 중인 service 이름으로 변경 (localhost X)
    kafka-server: kafka-service:9092
    consumer:
        group-id: product-group
        auto-offset-reset: earliest
